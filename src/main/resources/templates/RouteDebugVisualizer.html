<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meandr · Route Debug Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161820;
    --border: #252830;
    --accent: #4fffb0;
    --accent2: #ff6b6b;
    --accent3: #ffd166;
    --text: #e8eaf0;
    --muted: #6b7280;
    --card: #1c1f2a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
  }

  .logo span { color: var(--muted); }

  .stats-bar {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  .stat-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-value.warn { color: var(--accent3); }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  #map { flex: 1; height: 100%; }

  .request-panel {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 100;
    background: rgba(22, 24, 32, 0.95);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 260px;
    max-width: calc(100vw - 24px);
    font-family: 'Space Mono', monospace;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    overflow: hidden;
    backdrop-filter: blur(4px);
  }

  .request-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: #252830;
    cursor: pointer;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #6b7280;
    user-select: none;
  }
  .request-panel-header:hover { background: #2e3340; }
  .request-panel-title { color: var(--accent); }

  .request-panel-body {
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
  }

  .sidebar {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 100;
    width: 280px;
    min-width: 160px;
    max-width: calc(100vw - 24px);
    max-height: calc(100vh - 120px);
    background: rgba(22, 24, 32, 0.95);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-resize-handle {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    cursor: ew-resize;
    z-index: 101;
    border-radius: 10px 0 0 10px;
    transition: background 0.15s;
  }
  .sidebar-resize-handle:hover { background: var(--accent); }

  .sidebar-body { overflow-y: auto; flex: 1; }

  .map-btn {
    position: absolute;
    z-index: 100;
    background: rgba(22,24,32,0.9);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    padding: 8px 16px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: background 0.15s;
    backdrop-filter: blur(4px);
  }
  .map-btn:hover { background: var(--surface); }
  .map-maximize-btn { bottom: 24px; right: 10px; color: #60a5fa; border-color: #60a5fa55; }
  .map-maximize-btn:hover { background: #0a1628; }
  .map-rejected-btn { bottom: 70px; right: 10px; color: var(--accent2); }
  .map-rejected-btn.active { background: rgba(46,18,18,0.9); border-color: var(--accent2); }
  .map-selected-btn { bottom: 116px; right: 10px; color: var(--accent); }
  .map-selected-btn.inactive { background: rgba(13,46,30,0.5); border-color: #4fffb055; opacity: 0.6; }

  .sidebar-header {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
    flex-shrink: 0;
  }

  .waypoint-list { padding: 8px; flex: 1; }

  .wp-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .wp-card:hover, .wp-card.active { border-color: var(--accent); background: #1e2230; }

  .wp-index {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    float: right;
    margin-top: 1px;
  }

  .wp-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 5px;
    line-height: 1.3;
    padding-right: 24px;
  }

  .wp-meta { display: flex; gap: 6px; flex-wrap: wrap; }

  .tag {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    padding: 2px 6px;
    border-radius: 4px;
    background: #252830;
    color: var(--muted);
  }
  .tag.green { background: #0d2e1e; color: var(--accent); }
  .tag.red   { background: #2e1212; color: var(--accent2); }
  .tag.yellow{ background: #2e2412; color: var(--accent3); }

  .rejected-section { border-top: 1px solid var(--border); flex-shrink: 0; }
  .rejected-section .waypoint-list { max-height: 280px; overflow-y: auto; }
  .rejected-section .sidebar-header { color: var(--accent2); }
  .wp-card.rejected { opacity: 0.6; }
  .wp-card.rejected:hover { opacity: 1; }

  .gm-style .gm-style-iw-c {
    background: var(--card) !important;
    border-radius: 10px !important;
    padding: 0 !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
  }
  .gm-style .gm-style-iw-d { overflow: hidden !important; }
  .gm-style .gm-style-iw-t::after { background: var(--card) !important; }

  .iw {
    font-family: 'DM Sans', sans-serif;
    min-width: 240px;
    max-width: 280px;
    color: #e8eaf0;
  }
  .iw-header { background: #252830; padding: 12px 14px 10px; border-radius: 10px 10px 0 0; }
  .iw-name { font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; color: #fff; }
  .iw-address { font-size: 11px; color: #9ca3af; line-height: 1.4; }
  .iw-body {
    padding: 10px 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    background: #1c1f2a;
    border-radius: 0 0 10px 10px;
  }
  .iw-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
  .iw-row-label { color: #6b7280; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; font-family: 'Space Mono', monospace; }
  .iw-row-val { font-weight: 600; font-family: 'Space Mono', monospace; font-size: 12px; }
  .iw-row-val.accent { color: #4fffb0; }
  .iw-row-val.warn   { color: #ffd166; }
  .iw-row-val.danger { color: #ff6b6b; }
  .stars { color: #fbbf24; font-size: 12px; letter-spacing: 1px; }
  .iw-link {
    display: block; margin-top: 4px; text-align: center;
    padding: 7px; background: #252830; border-radius: 6px;
    font-size: 11px; color: #4fffb0; text-decoration: none;
    font-family: 'Space Mono', monospace; letter-spacing: 0.04em;
    transition: background 0.15s;
  }
  .iw-link:hover { background: #2e3340; }
  .iw-divider { height: 1px; background: #252830; margin: 2px 0; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .status-dot.open    { background: #4fffb0; }
  .status-dot.closed  { background: #ff6b6b; }
  .status-dot.unknown { background: #6b7280; }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .rp-row { display: flex; justify-content: space-between; align-items: flex-start; font-size: 11px; gap: 8px; }
  .rp-label { color: #6b7280; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; padding-top: 1px; }
  .rp-value { color: #e8eaf0; font-size: 11px; text-align: right; line-height: 1.4; }
  .rp-value.accent { color: #4fffb0; }
  .rp-value.warn   { color: #ffd166; }
  .rp-divider { height: 1px; background: #252830; margin: 2px 0; }
  .rp-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
  .rp-tag { font-size: 9px; padding: 2px 5px; border-radius: 3px; background: #1c1f2a; color: #9ca3af; border: 1px solid #252830; }
</style>
</head>
<body>

<header>
  <div class="logo">meandr<span>/debug</span></div>
  <div class="stats-bar" id="statsBar">
    <div class="stat">
      <span class="stat-label">Waypoints</span>
      <span class="stat-value" id="statWaypoints">—</span>
    </div>
    <div class="stat">
      <span class="stat-label">Total Detour</span>
      <span class="stat-value" id="statDetour">—</span>
    </div>
    <div class="stat">
      <span class="stat-label">Budget Used</span>
      <span class="stat-value" id="statBudget">—</span>
    </div>
    <div class="stat">
      <span class="stat-label">Enhancement</span>
      <span class="stat-value" id="statScenic">—</span>
    </div>
    <div class="stat">
      <span class="stat-label">Rejected</span>
      <span class="stat-value warn" id="statRejected">—</span>
    </div>
    <button onclick="resetVisualizer()" style="
      background:#252830; border:1px solid #374151; color:#9ca3af;
      font-family:'Space Mono',monospace; font-size:10px; padding:6px 14px;
      border-radius:6px; cursor:pointer; letter-spacing:0.06em; margin-left:8px;
    ">↺ New Route</button>
  </div>
</header>

<div id="pasteOverlay" style="
  position:fixed; inset:0; background:rgba(13,15,20,0.96); z-index:1000;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px;
  overflow-y:auto; padding:16px; box-sizing:border-box;
">
  <div style="font-family:'Space Mono',monospace; color:#4fffb0; font-size:13px; letter-spacing:0.08em;">meandr / paste route data</div>
  <div style="display:flex; flex-wrap:wrap; gap:16px; align-items:flex-start; justify-content:center; width:100%; max-width:1040px;">
    <div style="display:flex; flex-direction:column; gap:8px; flex:1; min-width:280px;">
      <div style="font-family:'Space Mono',monospace; font-size:10px; color:#6b7280; text-transform:uppercase; letter-spacing:0.1em;">Request JSON <span style="color:#374151">(optional)</span></div>
      <textarea id="requestInput" placeholder='Paste request JSON here (optional)...' style="
        width:100%; height:220px; background:#161820; border:1px solid #252830;
        border-radius:10px; color:#e8eaf0; font-family:'Space Mono',monospace; font-size:16px;
        padding:14px; resize:vertical; outline:none; line-height:1.6; box-sizing:border-box;
        -webkit-user-select: text; user-select: text;
      "></textarea>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px; flex:1; min-width:280px;">
      <div style="font-family:'Space Mono',monospace; font-size:10px; color:#6b7280; text-transform:uppercase; letter-spacing:0.1em;">Response JSON</div>
      <textarea id="jsonInput" placeholder='Paste BeautifiedRouteResponseDto JSON here...' style="
        width:100%; height:220px; background:#161820; border:1px solid #252830;
        border-radius:10px; color:#e8eaf0; font-family:'Space Mono',monospace; font-size:16px;
        padding:14px; resize:vertical; outline:none; line-height:1.6; box-sizing:border-box;
        -webkit-user-select: text; user-select: text;
      "></textarea>
    </div>
  </div>
  <div style="display:flex; gap:10px; align-items:center;">
    <div id="pasteError" style="font-family:'Space Mono',monospace; font-size:11px; color:#ff6b6b; display:none;"></div>
    <button onclick="loadSample()" style="
      background:#252830; border:1px solid #374151; color:#9ca3af;
      font-family:'Space Mono',monospace; font-size:11px; padding:8px 16px;
      border-radius:6px; cursor:pointer; letter-spacing:0.05em;
    ">Load Sample</button>
    <button onclick="loadJson()" style="
      background:#4fffb0; border:none; color:#0d0f14;
      font-family:'Space Mono',monospace; font-size:12px; font-weight:700;
      padding:10px 28px; border-radius:6px; cursor:pointer; letter-spacing:0.06em;
    ">Render Route →</button>
  </div>
</div>

<div class="main">
  <div id="map"></div>

  <!-- FLOATING REQUEST PARAMS PANEL -->
  <div class="request-panel" id="requestPanel">
    <div class="request-panel-header" onclick="toggleRequestPanel()">
      <span class="request-panel-title">Request Params</span>
      <span id="requestPanelIcon">▼</span>
    </div>
    <div class="request-panel-body" id="requestPanelBody">
      <div style="color:var(--muted);font-size:11px;">No request data</div>
    </div>
  </div>

  <button class="map-btn map-selected-btn" onclick="toggleMapSelected()" id="mapSelectedBtn">⊙ Selected</button>
  <button class="map-btn map-rejected-btn" onclick="toggleMapRejected()" id="mapRejectedBtn">⊘ Rejected</button>
  <button class="map-btn map-maximize-btn" onclick="toggleMapMaximize()" id="maximizeBtn">⤢ Maximize</button>

  <!-- WAYPOINTS SIDEBAR -->
  <div class="sidebar" id="waypointsSidebar">
    <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
    <div class="sidebar-header" style="cursor:pointer; background:#252830; border-radius:10px 10px 0 0;" onclick="toggleWaypointsPanel()">
      <span style="color:var(--accent);">Waypoints</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <span id="selectedCount" style="color:var(--accent);">0</span>
        <span id="waypointsPanelIcon" style="font-size:10px;color:#6b7280;">▼</span>
      </div>
    </div>
    <div id="waypointsPanelBody" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
      <div class="sidebar-body">
        <div class="waypoint-list" id="selectedList"></div>
      </div>
      <div class="rejected-section">
        <div class="sidebar-header" style="cursor:pointer;" onclick="toggleRejected()">
          <span>Rejected</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <span id="rejectedCount">0</span>
            <span id="rejectedToggleIcon" style="font-size:10px;color:#6b7280;">▶</span>
          </div>
        </div>
        <div class="waypoint-list" id="rejectedList" style="display:none;"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// PANEL TOGGLES
// ============================================================
let requestPanelOpen = true;
function toggleRequestPanel() {
  requestPanelOpen = !requestPanelOpen;
  document.getElementById("requestPanelBody").style.display = requestPanelOpen ? "flex" : "none";
  document.getElementById("requestPanelIcon").textContent = requestPanelOpen ? "▼" : "▶";
}

let waypointsPanelOpen = true;
function toggleWaypointsPanel() {
  waypointsPanelOpen = !waypointsPanelOpen;
  document.getElementById("waypointsPanelBody").style.display = waypointsPanelOpen ? "flex" : "none";
  document.getElementById("waypointsPanelIcon").textContent = waypointsPanelOpen ? "▼" : "▶";
}

// ============================================================
// DRAG + RESIZE
// ============================================================
function makeDraggable(el, handleEl) {
  let dragging = false;
  let dStartX, dStartY, dOrigLeft, dOrigTop;
  const THRESHOLD = 6;

  function prepDrag(cx, cy) {
    dStartX = cx; dStartY = cy;
    const rect = el.getBoundingClientRect();
    dOrigLeft = rect.left; dOrigTop = rect.top;
  }
  function moveDrag(cx, cy) {
    if (Math.abs(cx - dStartX) < THRESHOLD && Math.abs(cy - dStartY) < THRESHOLD) return;
    if (!dragging) {
      dragging = true;
      el.style.right = "auto";
      el.style.left = dOrigLeft + "px";
      el.style.top = dOrigTop + "px";
      document.body.style.userSelect = "none";
    }
    el.style.left = (dOrigLeft + cx - dStartX) + "px";
    el.style.top  = (dOrigTop  + cy - dStartY) + "px";
  }
  function endDrag() { dragging = false; document.body.style.userSelect = ""; }

  handleEl.addEventListener("mousedown",  e => { if (!e.target.closest(".sidebar-resize-handle")) prepDrag(e.clientX, e.clientY); });
  document.addEventListener("mousemove",  e => { if (dStartX !== undefined) moveDrag(e.clientX, e.clientY); });
  document.addEventListener("mouseup",    () => { endDrag(); dStartX = undefined; });
  handleEl.addEventListener("touchstart", e => { if (e.touches.length === 1) prepDrag(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
  document.addEventListener("touchmove",  e => { if (e.touches.length === 1 && dStartX !== undefined) moveDrag(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
  document.addEventListener("touchend",   () => { endDrag(); dStartX = undefined; });
}

function initSidebarDrag() {
  const sidebar = document.getElementById("waypointsSidebar");
  const resizeHandle = document.getElementById("sidebarResizeHandle");
  const header = sidebar.querySelector(".sidebar-header");
  makeDraggable(sidebar, header);

  let resizing = false, rStartX, rStartW;
  resizeHandle.addEventListener("mousedown", e => {
    e.stopPropagation();
    resizing = true;
    rStartX = e.clientX;
    rStartW = sidebar.getBoundingClientRect().width;
    document.body.style.cursor = "ew-resize";
    document.body.style.userSelect = "none";
  });
  document.addEventListener("mousemove", e => {
    if (!resizing) return;
    const dx = rStartX - e.clientX;
    const newW = Math.max(160, Math.min(600, rStartW + dx));
    sidebar.style.width = newW + "px";
  });
  document.addEventListener("mouseup", () => {
    if (!resizing) return;
    resizing = false;
    document.body.style.cursor = "";
    document.body.style.userSelect = "";
  });
}

function initRequestPanelDrag() {
  const panel = document.getElementById("requestPanel");
  const header = panel.querySelector(".request-panel-header");
  makeDraggable(panel, header);
}

// ============================================================
// MAXIMIZE + REJECTED TOGGLE
// ============================================================
let mapMaximized = false;
function resetVisualizer() {
  document.getElementById("pasteOverlay").style.display = "flex";
  document.getElementById("jsonInput").value = "";
  document.getElementById("requestInput").value = "";
  document.getElementById("requestPanelBody").innerHTML =
    "<div style='color:var(--muted);font-size:11px;font-family:Space Mono,monospace;'>No request data</div>";
  requestPanelOpen = true;
  document.getElementById("requestPanelIcon").textContent = "▼";
  waypointsPanelOpen = true;
  document.getElementById("waypointsPanelIcon").textContent = "▼";
  if (mapMaximized) toggleMapMaximize();
}

function toggleMapMaximize() {
  mapMaximized = !mapMaximized;
  const btn = document.getElementById("maximizeBtn");
  const sidebar = document.getElementById("waypointsSidebar");
  const panel = document.getElementById("requestPanel");
  if (mapMaximized) {
    sidebar.style.display = "none";
    panel.style.display = "none";
    btn.textContent = "⤡ Restore";
    const mapEl = document.querySelector(".main");
    if (mapEl.requestFullscreen) mapEl.requestFullscreen();
  } else {
    sidebar.style.display = "flex";
    panel.style.display = "block";
    btn.textContent = "⤢ Maximize";
    if (document.fullscreenElement) document.exitFullscreen();
  }
  if (map) google.maps.event.trigger(map, "resize");
}

document.addEventListener("fullscreenchange", () => {
  if (!document.fullscreenElement && mapMaximized) {
    mapMaximized = false;
    document.getElementById("waypointsSidebar").style.display = "flex";
    document.getElementById("requestPanel").style.display = "block";
    document.getElementById("maximizeBtn").textContent = "⤢ Maximize";
    if (map) google.maps.event.trigger(map, "resize");
  }
});

let mapRejectedVisible = false;
function toggleMapRejected() {
  mapRejectedVisible = !mapRejectedVisible;
  markers.filter(m => m.id.startsWith("rej-")).forEach(m => {
    m.marker.setVisible(mapRejectedVisible);
  });
  const btn = document.getElementById("mapRejectedBtn");
  btn.textContent = mapRejectedVisible ? "⊘ Rejected" : "⊕ Rejected";
  btn.classList.toggle("active", mapRejectedVisible);
}

let mapSelectedVisible = true;
function toggleMapSelected() {
  mapSelectedVisible = !mapSelectedVisible;
  markers.filter(m => m.id.startsWith("sel-")).forEach(m => {
    m.marker.setVisible(mapSelectedVisible);
  });
  const btn = document.getElementById("mapSelectedBtn");
  btn.textContent = mapSelectedVisible ? "⊙ Selected" : "⊕ Selected";
  btn.classList.toggle("inactive", !mapSelectedVisible);
}

let rejectedVisible = false;
function toggleRejected() {
  rejectedVisible = !rejectedVisible;
  document.getElementById("rejectedList").style.display = rejectedVisible ? "block" : "none";
  document.getElementById("rejectedToggleIcon").textContent = rejectedVisible ? "▼" : "▶";
  markers.filter(m => m.id.startsWith("rej-")).forEach(m => {
    m.marker.setVisible(rejectedVisible);
  });
}

// ============================================================
// GLOBALS
// ============================================================
let ROUTE_DATA = null;

function loadSample() {
  document.getElementById("jsonInput").value = JSON.stringify(SAMPLE_DATA, null, 2);
}

function loadJson() {
  const raw = document.getElementById("jsonInput").value.trim();
  const errEl = document.getElementById("pasteError");
  errEl.style.display = "none";

  let parsed;
  try { parsed = JSON.parse(raw); }
  catch(e) { errEl.textContent = "Invalid JSON: " + e.message; errEl.style.display = "block"; return; }

  if (!parsed.selectedWaypoints) {
    errEl.textContent = "Missing 'selectedWaypoints' array in JSON.";
    errEl.style.display = "block";
    return;
  }

  const s = parsed.summary || {};
  ROUTE_DATA = {
    summary: {
      waypointCount:        s.waypointCount          || parsed.selectedWaypoints.length,
      totalDetourMins:      s.additionalMeandrMins   || 0,
      totalBudgetMins:      s.enhancementBudgetMins  || 0,
      originalDurationMins: s.originalDurationMins   || 0,
      budgetUtilization:    s.budgetUtilization      || 0,
      actualEnhancement:    s.actualEnhancement      || null,
      warningMessage:       parsed.warningMessage    || null
    },
    origin:      parsed.origin      || inferTerminal(parsed.selectedWaypoints, true),
    destination: parsed.destination || inferTerminal(parsed.selectedWaypoints, false),
    selectedWaypoints: parsed.selectedWaypoints,
    rejectedWaypoints: parsed.rejectedWaypoints || []
  };

  const rawRequest = document.getElementById("requestInput").value.trim();
  REQUEST_DATA = rawRequest ? (() => { try { return JSON.parse(rawRequest); } catch(e) { return null; } })() : null;

  document.getElementById("pasteOverlay").style.display = "none";
  clearMap();
  populateStats();
  renderSidebar();
  renderRoute();
  renderRequestPanel();
}

function inferTerminal(waypoints, isFirst) {
  const wp = isFirst ? waypoints[0] : waypoints[waypoints.length - 1];
  return wp ? { lat: wp.lat, lng: wp.lng, name: wp.name } : { lat: 0, lng: 0, name: "Unknown" };
}

function clearMap() {
  markers.forEach(m => {
    m.marker.setMap(null);
    if (m.label) m.label.setMap(null);
  });
  markers = [];
  if (activeInfoWindow) { activeInfoWindow.close(); activeInfoWindow = null; }
  renderers.forEach(r => r.setMap(null));
  renderers = [];
  document.getElementById("selectedList").innerHTML = "";
  document.getElementById("rejectedList").innerHTML = "";
}

// MAP INIT

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 35.1, lng: -116.8 },
    zoom: 7,
    styles: darkMapStyle(),
    disableDefaultUI: false,
    zoomControl: true,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false
  });

  directionsService = new google.maps.DirectionsService();
  initSidebarDrag();
  initRequestPanelDrag();
}

// ============================================================
// ROUTING + RENDERING
// ============================================================
function renderRoute() {
  const selected = ROUTE_DATA.selectedWaypoints;
  const chunks = chunkWaypoints(selected);
  renderChunk(chunks, 0);
}

function chunkWaypoints(spots) {
  const chunkSize = 23;
  const chunks = [];
  for (let i = 0; i < spots.length - 1; i += chunkSize) {
    const end = Math.min(i + chunkSize + 1, spots.length - 1);
    chunks.push(spots.slice(i, end + 1));
    if (end === spots.length - 1) break;
  }
  return chunks;
}

function renderChunk(chunks, idx) {
  if (idx >= chunks.length) { renderMarkers(); return; }

  const chunk = chunks[idx];
  const waypts = chunk.slice(1, chunk.length - 1).map(wp => ({
    location: new google.maps.LatLng(wp.lat, wp.lng),
    stopover: true
  }));

  const request = {
    origin:      new google.maps.LatLng(chunk[0].lat, chunk[0].lng),
    destination: new google.maps.LatLng(chunk[chunk.length - 1].lat, chunk[chunk.length - 1].lng),
    waypoints:   waypts,
    travelMode:  google.maps.TravelMode.DRIVING
  };

  // White halo layer underneath — gives the native Google Maps outline effect
  const haloRenderer = new google.maps.DirectionsRenderer({
    map,
    suppressMarkers: true,
    suppressInfoWindows: true,
    polylineOptions: {
      strokeColor: "#FFFFFF",
      strokeWeight: 10,
      strokeOpacity: 0.35,
      zIndex: 1
    }
  });
  renderers.push(haloRenderer);

  // Blue route layer on top
  const renderer = new google.maps.DirectionsRenderer({
    map,
    suppressMarkers: true,
    suppressInfoWindows: true,
    polylineOptions: {
      strokeColor: "#4285F4",
      strokeWeight: 6,
      strokeOpacity: 0.92,
      zIndex: 2
    }
  });
  renderers.push(renderer);

  directionsService.route(request, (result, status) => {
    if (status === "OK") {
      haloRenderer.setDirections(result);
      renderer.setDirections(result);
    }
    renderChunk(chunks, idx + 1);
  });
}

// ============================================================
// MARKERS + LABELS
// ============================================================
function truncate(str, max) {
  return str.length > max ? str.substring(0, max).trimEnd() + "…" : str;
}

function makeLabelOverlay(position, text, color, isRejected) {
  // Custom overlay for left-side label
  class LabelOverlay extends google.maps.OverlayView {
    constructor(pos, txt, clr, rejected) {
      super();
      this.pos = pos;
      this.txt = txt;
      this.clr = clr;
      this.rejected = rejected;
      this.div = null;
    }
    onAdd() {
      this.div = document.createElement("div");
      this.div.style.cssText = `
        position: absolute;
        font-family: 'DM Sans', sans-serif;
        font-size: 11px;
        font-weight: 600;
        color: ${this.clr};
        background: rgba(13,15,20,0.72);
        padding: 1px 3px;
        border-radius: 2px;
        white-space: nowrap;
        pointer-events: none;
        opacity: ${this.rejected ? 0.6 : 1};
        letter-spacing: 0.01em;
        text-shadow: 0 1px 3px rgba(0,0,0,0.95);
        display: ${this._visible === false ? 'none' : ''};
      `;
      this.div.textContent = this.txt;
      this.getPanes().overlayLayer.appendChild(this.div);
    }
    draw() {
      const proj = this.getProjection();
      if (!proj) return;
      const point = proj.fromLatLngToDivPixel(this.pos);
      if (!point) return;
      const w = this.div ? this.div.offsetWidth : 60;
      // Tight left — 6px gap from marker edge, vertically centered
      this.div.style.left = (point.x - w - 6) + "px";
      this.div.style.top  = (point.y - 7) + "px";
    }
    onRemove() {
      if (this.div && this.div.parentNode) this.div.parentNode.removeChild(this.div);
      this.div = null;
    }
    setVisible(v) {
      this._visible = v;
      if (this.div) this.div.style.display = v ? "" : "none";
    }
  }

  const overlay = new LabelOverlay(position, text, color, isRejected);
  overlay.setMap(map);
  return overlay;
}

function renderMarkers() {
  // Terminal markers — drawn once, suppressed on renderers
  addTerminalMarker(ROUTE_DATA.origin, "A", "#4fffb0");
  addTerminalMarker(ROUTE_DATA.destination, "B", "#4fffb0");

  // Selected waypoint markers — pill icons with name embedded
  ROUTE_DATA.selectedWaypoints.forEach((wp, i) => {
    const color = scoreColor(wp.score);
    const pos = new google.maps.LatLng(wp.lat, wp.lng);

    const marker = new google.maps.Marker({
      position: pos,
      map,
      icon: pillIcon(i + 1, wp.name, color, false),
      title: wp.name,
      zIndex: 10
    });

    const iw = new google.maps.InfoWindow({
      content: buildInfoWindow(wp, i + 1, false),
      maxWidth: 290
    });

    marker.addListener("click", () => {
      if (activeInfoWindow) activeInfoWindow.close();
      iw.open(map, marker);
      activeInfoWindow = iw;
      highlightCard("sel-" + i);
    });

    markers.push({ marker, iw, label: null, id: "sel-" + i });
  });

  // Rejected markers — pill icons, hidden by default
  ROUTE_DATA.rejectedWaypoints.forEach((wp, i) => {
    const pos = new google.maps.LatLng(wp.lat, wp.lng);

    const marker = new google.maps.Marker({
      position: pos,
      map,
      icon: pillIcon(null, wp.name, "#ff6b6b", true),
      title: wp.name + " (rejected)",
      zIndex: 5,
      visible: false
    });

    const iw = new google.maps.InfoWindow({
      content: buildInfoWindow(wp, null, true),
      maxWidth: 290
    });

    marker.addListener("click", () => {
      if (activeInfoWindow) activeInfoWindow.close();
      iw.open(map, marker);
      activeInfoWindow = iw;
    });

    markers.push({ marker, iw, label: null, id: "rej-" + i });
  });
}

function addTerminalMarker(loc, label, color) {
  new google.maps.Marker({
    position: { lat: loc.lat, lng: loc.lng },
    map,
    icon: terminalIcon(label, color),
    title: loc.name,
    zIndex: 20
  });
}

function pillIcon(index, name, color, isRejected = false) {
  const ch = 28;                          // circle height/width
  const r = ch / 2;                       // circle radius
  const label = isRejected ? "✕" : String(index);
  const truncated = name.length > 22 ? name.substring(0, 22).trimEnd() + "…" : name;
  const charW = 6.5;                      // approx px per char at font-size 11
  const textW = Math.ceil(truncated.length * charW);
  const pillW = ch + textW + 14;          // circle + text + padding
  const totalH = ch + 8;                  // height + tail
  const opacity = isRejected ? "0.7" : "1";

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${pillW}" height="${totalH}" viewBox="0 0 ${pillW} ${totalH}">
    <!-- pill background -->
    <rect x="0" y="0" width="${pillW}" height="${ch}" rx="${r}" ry="${r}"
      fill="#0d0f14" fill-opacity="0.82" stroke="${color}" stroke-width="1.5" opacity="${opacity}"/>
    <!-- colored circle -->
    <circle cx="${r}" cy="${r}" r="${r - 1}" fill="${color}" opacity="${opacity}"/>
    <!-- number/x in circle -->
    <text x="${r}" y="${r + 4}" text-anchor="middle"
      font-family="Space Mono, monospace" font-size="11" font-weight="700" fill="#0d0f14"
      opacity="${opacity}">${label}</text>
    <!-- place name -->
    <text x="${ch + 7}" y="${r + 4}" text-anchor="start"
      font-family="DM Sans, sans-serif" font-size="11" font-weight="600" fill="${color}"
      opacity="${opacity}">${truncated}</text>
    <!-- tail line from bottom of circle -->
    <line x1="${r}" y1="${ch}" x2="${r}" y2="${totalH}"
      stroke="${color}" stroke-width="1.5" opacity="${opacity}"/>
  </svg>`;

  return {
    url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
    scaledSize: new google.maps.Size(pillW, totalH),
    anchor: new google.maps.Point(r, totalH)  // anchor at tail tip
  };
}

// Keep plain circle for terminal markers
function markerIcon(label, color, small = false) {
  const size = small ? 22 : 28;
  const fontSize = small ? 9 : 11;
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size + 8}" viewBox="0 0 ${size} ${size + 8}">
      <circle cx="${size/2}" cy="${size/2}" r="${size/2 - 1}" fill="${color}" stroke="#0d0f14" stroke-width="2"/>
      <line x1="${size/2}" y1="${size - 1}" x2="${size/2}" y2="${size + 7}" stroke="${color}" stroke-width="1.5"/>
      <text x="${size/2}" y="${size/2 + fontSize/2 - 1}" text-anchor="middle" font-family="Space Mono, monospace" font-size="${fontSize}" font-weight="700" fill="#0d0f14">${label}</text>
    </svg>`;
  return {
    url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
    scaledSize: new google.maps.Size(size, size + 8),
    anchor: new google.maps.Point(size / 2, size + 8)
  };
}

function terminalIcon(label, color) {
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="44" viewBox="0 0 32 44">
      <path d="M16 2 C8.3 2 2 8.3 2 16 C2 26 16 42 16 42 C16 42 30 26 30 16 C30 8.3 23.7 2 16 2 Z" fill="${color}" stroke="#0d0f14" stroke-width="2"/>
      <text x="16" y="21" text-anchor="middle" font-family="Space Mono, monospace" font-size="13" font-weight="700" fill="#0d0f14">${label}</text>
    </svg>`;
  return {
    url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
    scaledSize: new google.maps.Size(32, 44),
    anchor: new google.maps.Point(16, 44)
  };
}

function normalizeScore(score) {
  return score > 1 ? score / 25.0 : score;
}

function scoreColor(score) {
  const ns = normalizeScore(score);
  if (ns >= 0.75) return "#4fffb0";
  if (ns >= 0.55) return "#ffd166";
  return "#ff6b6b";
}

function buildInfoWindow(wp, index, isRejected) {
  const stars = ratingStars(wp.rating);
  const statusClass = wp.openNow ? "open" : (wp.businessStatus === "CLOSED_PERMANENTLY" ? "closed" : "unknown");
  const statusText  = wp.openNow ? "Open Now" : (wp.businessStatus === "CLOSED_PERMANENTLY" ? "Permanently Closed" : "Closed / Unknown");
  const detourColor = wp.detour > 30 ? "danger" : wp.detour > 15 ? "warn" : "accent";
  const ns = normalizeScore(wp.score);
  const scoreColor_ = ns >= 0.75 ? "accent" : ns >= 0.55 ? "warn" : "danger";
  const scoreDisplay = wp.score > 1 ? wp.score.toFixed(2) : (wp.score * 100).toFixed(1) + "%";
  const mapsUrl = wp.placeId
    ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(wp.name)}&query_place_id=${wp.placeId}`
    : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(wp.name + " " + (wp.address||""))}`;
  const indexLabel = index ? `#${index}` : "Rejected";

  return `
    <div class="iw">
      <div class="iw-header">
        <div class="iw-name">${wp.name}</div>
        <div class="iw-address">${wp.address || ""}</div>
      </div>
      <div class="iw-body">
        <div class="iw-row"><span class="iw-row-label">Stop</span><span class="iw-row-val ${isRejected ? 'danger' : 'accent'}">${indexLabel}</span></div>
        <div class="iw-row"><span class="iw-row-label">Rating</span><span class="iw-row-val"><span class="stars">${stars}</span> ${wp.rating} <span style="color:#6b7280;font-size:10px">(${wp.userRatingsTotal.toLocaleString()})</span></span></div>
        <div class="iw-row"><span class="iw-row-label">Score</span><span class="iw-row-val ${scoreColor_}">${scoreDisplay}</span></div>
        <div class="iw-row"><span class="iw-row-label">Detour</span><span class="iw-row-val ${detourColor}">${wp.detour} min</span></div>
        <div class="iw-divider"></div>
        <div class="iw-row"><span class="iw-row-label">Status</span><span class="iw-row-val"><span class="status-dot ${statusClass}"></span>${statusText}</span></div>
        <a class="iw-link" href="${mapsUrl}" target="_blank">Open in Google Maps ↗</a>
      </div>
    </div>`;
}

// STATS + SIDEBAR
// ============================================================
function populateStats() {
  const s = ROUTE_DATA.summary;
  document.getElementById("statWaypoints").textContent = s.waypointCount;
  document.getElementById("statDetour").textContent    = s.totalDetourMins ? s.totalDetourMins.toFixed(0) + " min" : "—";
  document.getElementById("statBudget").textContent    = s.budgetUtilization
    ? s.budgetUtilization.toFixed(1) + "% of " + s.totalBudgetMins.toFixed(0) + "m" : (s.totalBudgetMins ? s.totalBudgetMins + " min" : "—");
  document.getElementById("statScenic").textContent    = s.actualEnhancement != null ? s.actualEnhancement.toFixed(1) + "%" : "—";
  document.getElementById("statRejected").textContent  = ROUTE_DATA.rejectedWaypoints.length;
  document.getElementById("selectedCount").textContent = ROUTE_DATA.selectedWaypoints.length;
  document.getElementById("rejectedCount").textContent = ROUTE_DATA.rejectedWaypoints.length;

  if (s.warningMessage) {
    const warn = document.createElement("div");
    warn.style.cssText = "background:#2e1c0a;border:1px solid #7c3a00;color:#ffd166;font-family:'Space Mono',monospace;font-size:10px;padding:6px 12px;text-align:center;flex-shrink:0;";
    warn.textContent = "⚠ " + s.warningMessage;
    document.querySelector("header").after(warn);
  }
}

function renderSidebar() {
  const selList = document.getElementById("selectedList");
  const rejList = document.getElementById("rejectedList");
  ROUTE_DATA.selectedWaypoints.forEach((wp, i) => selList.appendChild(buildSidebarCard(wp, i + 1, false, "sel-" + i)));
  ROUTE_DATA.rejectedWaypoints.forEach((wp, i) => rejList.appendChild(buildSidebarCard(wp, null, true, "rej-" + i)));
}

function buildSidebarCard(wp, index, isRejected, id) {
  const div = document.createElement("div");
  div.className = "wp-card" + (isRejected ? " rejected" : "");
  div.id = "card-" + id;
  const detourClass = wp.detour > 30 ? "red" : wp.detour > 15 ? "yellow" : "green";
  const ns = normalizeScore(wp.score);
  const scoreClass = ns >= 0.75 ? "green" : ns >= 0.55 ? "yellow" : "red";
  const scoreDisplay = wp.score > 1 ? wp.score.toFixed(1) : (wp.score * 100).toFixed(0) + "%";

  div.innerHTML = `
    <span class="wp-index">${index ? "#" + index : "✕"}</span>
    <div class="wp-name">${wp.name}</div>
    <div class="wp-meta">
      <span class="tag ${scoreClass}">score ${scoreDisplay}</span>
      <span class="tag ${detourClass}">+${wp.detour}m</span>
      <span class="tag">${wp.rating}★</span>
    </div>`;

  div.addEventListener("click", () => {
    const entry = markers.find(m => m.id === id);
    if (entry) {
      map.panTo(entry.marker.getPosition());
      map.setZoom(14);
      if (activeInfoWindow) activeInfoWindow.close();
      entry.iw.open(map, entry.marker);
      activeInfoWindow = entry.iw;
    }
    highlightCard(id);
  });
  return div;
}

function highlightCard(id) {
  if (activeCard) {
    const prev = document.getElementById("card-" + activeCard);
    if (prev) prev.classList.remove("active");
  }
  const curr = document.getElementById("card-" + id);
  if (curr) {
    curr.classList.add("active");
    curr.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }
  activeCard = id;
}

// ============================================================
// REQUEST PANEL
// ============================================================
function renderRequestPanel() {
  if (!REQUEST_DATA) return;
  const r = REQUEST_DATA;
  const body = document.getElementById("requestPanelBody");
  body.style.display = requestPanelOpen ? "flex" : "none";
  body.style.flexDirection = "column";

  const originStr = r.origin ? `${r.origin.lat.toFixed(4)}, ${r.origin.lng.toFixed(4)}` : "—";
  const destStr   = r.destination ? `${r.destination.lat.toFixed(4)}, ${r.destination.lng.toFixed(4)}` : "—";
  const prefs = r.entityPreferences || [];

  body.innerHTML = `
    <div class="rp-row"><span class="rp-label">Origin</span><span class="rp-value">${originStr}</span></div>
    <div class="rp-row"><span class="rp-label">Dest</span><span class="rp-value">${destStr}</span></div>
    <div class="rp-divider"></div>
    <div class="rp-row">
      <span class="rp-label">Baseline Mins</span>
      <span class="rp-value accent">${ROUTE_DATA.summary.originalDurationMins || "—"}</span>
    </div>
    <div class="rp-row">
      <span class="rp-label">Route Enhancement</span>
      <span class="rp-value accent">${r.routeEnhancementThreshold != null ? r.routeEnhancementThreshold + "%" : "—"}</span>
    </div>
    <div class="rp-row"><span class="rp-label">Radius</span><span class="rp-value">${r.radius ? (r.radius / 1000).toFixed(1) + " km" : "—"}</span></div>
    <div class="rp-row"><span class="rp-label">Dwell</span><span class="rp-value">${r.dwellTimePerStop != null ? r.dwellTimePerStop + " min" : "—"}</span></div>
    <div class="rp-row">
      <span class="rp-label">Highways</span>
      <span class="rp-value ${r.avoidHighways ? 'warn' : 'accent'}">${r.avoidHighways ? "Avoided" : "Allowed"}</span>
    </div>
    <div class="rp-divider"></div>
    <div class="rp-label" style="margin-bottom:4px;">Entity Prefs</div>
    <div class="rp-tags">${prefs.map(p => `<span class="rp-tag">${p.replace(/_/g, " ")}</span>`).join("")}</div>
  `;
}

// ============================================================
// HELPERS
// ============================================================
function ratingStars(rating) {
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5 ? 1 : 0;
  return "★".repeat(full) + (half ? "½" : "") + "☆".repeat(5 - full - half);
}

function darkMapStyle() {
  return [
    { elementType: "geometry", stylers: [{ color: "#1a1c26" }] },
    { elementType: "labels.text.stroke", stylers: [{ color: "#1a1c26" }] },
    { elementType: "labels.text.fill", stylers: [{ color: "#6b7280" }] },
    { featureType: "road", elementType: "geometry", stylers: [{ color: "#2a2d3a" }] },
    { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#1a1c26" }] },
    { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#9ca3af" }] },
    { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#3a3d4a" }] },
